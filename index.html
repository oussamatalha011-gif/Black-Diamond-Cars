<script>
  (function(){
    const track = document.getElementById("revTrack");
    const cards = Array.from(track.children);
    const dotsWrap = document.getElementById("revDots");
    let i = 0;
    let timer = null;

    // create dots
    cards.forEach((_, idx) => {
      const b = document.createElement("button");
      b.className = "rev-dot" + (idx === 0 ? " active" : "");
      b.setAttribute("aria-label", "review " + (idx+1));
      b.addEventListener("click", () => go(idx, true));
      dotsWrap.appendChild(b);
    });

    function setActiveDot(idx){
      Array.from(dotsWrap.children).forEach((d, di) => {
        d.classList.toggle("active", di === idx);
      });
    }

    function go(idx, restart){
      i = (idx + cards.length) % cards.length;
      track.style.transform = "translateX(" + (-i * 100) + "%)";
      setActiveDot(i);
      if(restart){ start(); }
    }

    function start(){
      if(timer) clearInterval(timer);
      timer = setInterval(() => go(i+1, false), 3500); // speed
    }

    // pause on touch/hover (mobile friendly)
    let downX = null;
    track.addEventListener("touchstart", e => { downX = e.touches[0].clientX; }, {passive:true});
    track.addEventListener("touchend", e => {
      if(downX == null) return;
      const upX = e.changedTouches[0].clientX;
      const diff = upX - downX;
      if(Math.abs(diff) > 35){
        if(diff > 0) go(i-1, true);
        else go(i+1, true);
      } else start();
      downX = null;
    }, {passive:true});

    start();
  })();
</script>

  // ✅ رسالة الحجز بالفرنسية: غير الحجز + اسم السيارة
  function waLink(carName){
    const msg = `Bonjour, je voudrais réserver la voiture : ${carName}.`;
    return `https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(msg)}`;
  }

  function safeText(s){
    return String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
  }

  function render(){
    const q = (document.getElementById("q").value || "").toLowerCase().trim();
    const grid = document.getElementById("grid");
    grid.innerHTML = "";

    cars
      .filter(c => !q || c.name.toLowerCase().includes(q) || c.details.toLowerCase().includes(q))
      .forEach(c => {
        const card = document.createElement("article");
        card.className = "card";
        card.innerHTML = `
          <img class="img" src="${encodeURI(c.img)}" alt="${safeText(c.name)}" loading="lazy">
          <div class="content">
            <h3 class="title">${safeText(c.name)}</h3>
            <p class="price">${c.mad} MAD / day</p>
            <p class="meta">${safeText(c.details)}</p>
            <a class="btn" href="${waLink(c.name)}" target="_blank" rel="noopener">Reserve now (WhatsApp)</a>
            <div class="tagrow">
              ${(c.tags||[]).map(t => `<span class="tag">${safeText(t)}</span>`).join("")}
            </div>
          </div>
        `;
        grid.appendChild(card);
      });
  }

  render();
</script>
