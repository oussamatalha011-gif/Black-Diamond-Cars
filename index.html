<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Catalogue سيارات الكراء</title>
  <style>
    body{font-family:system-ui,Arial; margin:0; background:#f6f7fb; color:#111}
    header{padding:18px 16px; background:#fff; position:sticky; top:0; border-bottom:1px solid #eee}
    .wrap{max-width:1100px; margin:0 auto}
    h1{margin:0; font-size:18px}
    .sub{margin:6px 0 0; font-size:13px; color:#555}
    .grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:14px; padding:16px}
    .card{background:#fff; border:1px solid #eee; border-radius:16px; overflow:hidden; box-shadow:0 6px 18px rgba(0,0,0,.05)}
    .img{width:100%; height:170px; background:#ddd; object-fit:cover}
    .content{padding:12px}
    .title{font-weight:700; margin:0 0 6px}
    .price{display:flex; gap:10px; align-items:baseline; margin:0 0 8px}
    .eur{font-weight:700}
    .mad{color:#0a7; font-weight:700}
    .details{margin:0 0 12px; color:#555; font-size:13px; line-height:1.5}
    .btn{display:inline-block; width:100%; text-align:center; padding:12px 10px; border-radius:12px;
         background:#25D366; color:#fff; text-decoration:none; font-weight:700}
    .toprow{display:flex; gap:10px; align-items:center; margin-top:10px}
    input{flex:1; padding:12px 12px; border-radius:12px; border:1px solid #ddd; outline:none}
    .note{padding:0 16px 10px; color:#666; font-size:12px}
  </style>
</head>
<body>
<header>
  <div class="wrap">
    <h1>Catalogue سيارات الكراء</h1>
    <div class="sub">الأسعار باليورو والدرهم — 1€ = 10 MAD</div>
    <div class="toprow">
      <input id="q" placeholder="ابحث: Audi, Porsche, Range Rover..." oninput="render()" />
    </div>
  </div>
</header>

<div class="wrap">
  <div class="note">اضغط “Reserve now” وسيتم فتح واتساب برسالة جاهزة.</div>
</div>

<main class="wrap">
  <section id="grid" class="grid"></section>
</main>

<script>
  const WHATSAPP_NUMBER = "212653654229"; // رقمك بدون +
  const EUR_TO_MAD = 10;

  const cars = [
    {name:"Audi Q8 s line 50 TDI", eur:250, img:"images/audi-q8.jpg", details:"SUV فخم — أوتوماتيك — ديزل"},
    {name:"Range Rover sport P440e hybrid", eur:400, img:"images/rr-sport.jpg", details:"Hybrid — SUV فخم — راحة عالية"},
    {name:"Porsche Cayenne coupé", eur:400, img:"images/cayenne.jpg", details:"Sport SUV — أوتوماتيك"},
    {name:"Porsche Cayenne coupé", eur:350, img:"images/cayenne-2.jpg", details:"نسخة أخرى — نفس الموديل"},
    {name:"Volkswagen Touareg", eur:120, img:"images/touareg.jpg", details:"SUV — اقتصادي — أوتوماتيك"},
    {name:"Range Rover Evoque", eur:150, img:"images/evoque.jpg", details:"SUV — أنيق — أوتوماتيك"},
    {name:"Mercedes Sprinter (مع سائق)", eur:300, img:"images/sprinter.jpg", details:"Van — chauffeur included"},
    {name:"Vito (مع سائق)", eur:200, img:"images/vito.jpg", details:"Van — chauffeur included"},
    {name:"Mercedes Classe S 400", eur:600, img:"images/s400.jpg", details:"Luxury — VIP"},
    {name:"Porsche Macan T", eur:250, img:"images/macan-t.jpg", details:"SUV رياضي — أوتوماتيك"},
    {name:"Mercedes Classe C 220 Pack AMG", eur:200, img:"images/c220.jpg", details:"Sedan — AMG pack"},
    {name:"Range Rover Vogue", eur:500, img:"images/vogue.jpg", details:"Luxury SUV — أوتوماتيك"},
    {name:"Range Rover Vogue 2025", eur:500, img:"images/vogue-2025.jpg", details:"موديل جديد — VIP"},
    {name:"Cupra 2025", eur:120, img:"images/cupra.jpg", details:"Sport — اقتصادي"},
    {name:"Mercedes CLA 45 AMG", eur:350, img:"images/cla45.jpg", details:"AMG — رياضي"},
    {name:"Mercedes Classe G63", eur:1100, img:"images/g63.jpg", details:"G-Class — VIP"},
    {name:"Audi A3 s line 2023", eur:120, img:"images/a3-2023.jpg", details:"S line — اقتصادي"},
    {name:"BMW Série 5 Pack M 2024", eur:220, img:"images/bmw5.jpg", details:"Pack M — راحة وفخامة"},
    {name:"Audi A3 s line blue", eur:120, img:"images/a3-blue.jpg", details:"S line — لون أزرق"},
    {name:"Porsche Macan S 380 CH", eur:300, img:"images/macan-s.jpg", details:"Macan S — قوي"}
  ];

  function waLink(carName, eur, mad){
    const text = `Salam, bghit n7جز: ${carName}%0AThمن: ${eur}€ (${mad} MAD) / jour%0ATarikh: `;
    return `https://wa.me/${WHATSAPP_NUMBER}?text=${text}`;
  }

  function render(){
    const q = (document.getElementById("q").value || "").toLowerCase().trim();
    const grid = document.getElementById("grid");
    grid.innerHTML = "";

    cars
      .filter(c => !q || c.name.toLowerCase().includes(q))
      .forEach(c => {
        const mad = c.eur * EUR_TO_MAD;
        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `
          <img class="img" src="${c.img}" alt="${c.name}" onerror="this.style.display='none'">
          <div class="content">
            <p class="title">${c.name}</p>
            <p class="price"><span class="eur">${c.eur}€ / day</span> <span class="mad">${mad} MAD / day</span></p>
            <p class="details">${c.details}</p>
            <a class="btn" href="${waLink(encodeURIComponent(c.name), c.eur, mad)}" target="_blank" rel="noopener">Reserve now (WhatsApp)</a>
          </div>
        `;
        grid.appendChild(card);
      });
  }
  render();
</script>
</body>
</html>
