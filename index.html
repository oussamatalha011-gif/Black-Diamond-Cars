<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Black Diamond Cars</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:#0b0b0f;
color:white;
}

header{
background:#000;
padding:20px;
text-align:center;
font-size:26px;
font-weight:bold;
color:#d6b15e;
}

.search{
padding:15px;
text-align:center;
}

.search input{
width:80%;
padding:12px;
border-radius:10px;
border:none;
font-size:16px;
}

.container{
max-width:1100px;
margin:auto;
padding:15px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:20px;
}

.card{
background:#14141c;
border-radius:15px;
overflow:hidden;
box-shadow:0 10px 30px rgba(0,0,0,0.6);
}

.card img{
width:100%;
height:200px;
object-fit:cover;
}

.content{
padding:15px;
}

.title{
font-size:18px;
font-weight:bold;
margin-bottom:10px;
}

.price{
color:#46f3b4;
font-size:18px;
font-weight:bold;
margin-bottom:10px;
}

.details{
font-size:13px;
color:#ccc;
margin-bottom:15px;
}

.btn{
display:block;
background:#25D366;
text-align:center;
padding:12px;
border-radius:10px;
text-decoration:none;
color:white;
font-weight:bold;
}

footer{
text-align:center;
padding:25px;
color:#aaa;
font-size:13px;
}

</style>
</head>

<body>

<header>
Black Diamond Cars
</header>

<div class="search">
<input type="text" id="search" placeholder="ابحث عن سيارة..." oninput="renderCars()">
</div>

<div class="container" id="cars"></div>

<footer>
WhatsApp: 212653654229
</footer>

<script>

const WHATSAPP="212653654229";

const cars=[

{
name:"Audi Q8 s line 50 TDI",
price:2500,
img:"images/2019_audi_q8_uk_108_2560x1440.jpg",
details:"SUV فخم — أوتوماتيك — ديزل"
},

{
name:"Range Rover Sport P440e hybrid",
price:4000,
img:"images/New Range Rover Sport 001_vyiis9.jpg",
details:"Hybrid — SUV فخم — راحة عالية"
},

{
name:"Porsche Cayenne coupé",
price:4000,
img:"images/050757A5E50C4790BEF193EB374BE5B3_F8AE1EFF7CD94C7288646CF8C4091521_CY24J5LIX0011-cayenne-coupe-front.png",
details:"Sport SUV — أوتوماتيك"
},

{
name:"Volkswagen Touareg",
price:1200,
img:"images/61-vw-touareg-front-cornering.jpg",
details:"SUV — اقتصادي — أوتوماتيك"
},

{
name:"Range Rover Evoque",
price:1500,
img:"images/2020-Range-Rover-Evoque-Navarik-Black-Color.png",
details:"SUV — أنيق — أوتوماتيك"
},

{
name:"Mercedes Sprinter (avec chauffeur)",
price:3000,
img:"images/chauffeur-driven-mercedes-benz-sprinter-pml-44-service-in-la-514-8353-m.jpg",
details:"VIP نقل — مع سائق"
},

{
name:"Mercedes Vito (avec chauffeur)",
price:2000,
img:"images/Mercedes_Benz_Vito_BVA_2024_Luxury_Van_11_1746534680.jpg",
details:"Van — مع سائق"
},

{
name:"Mercedes Classe S 400",
price:6000,
img:"images/Mercedes-Benz-S400d-2021-1600-1b.jpg",
details:"Luxury — VIP"
},

{
name:"Porsche Macan",
price:2500,
img:"images/macan_053.jpg",
details:"SUV رياضي — أوتوماتيك"
},

{
name:"Mercedes C-Class AMG Line",
price:2000,
img:"images/mercedes-benz-c-class-amg-line-front-720x405px.jpg",
details:"AMG Line — Sedan"
}

];

function renderCars(){

const search=document.getElementById("search").value.toLowerCase();

const container=document.getElementById("cars");

container.innerHTML="";

cars
.filter(car=>car.name.toLowerCase().includes(search))
.forEach(car=>{

const card=document.createElement("div");

card.className="card";

card.innerHTML=`

<img src="${encodeURI(car.img)}">

<div class="content">

<div class="title">${car.name}</div>

<div class="price">${car.price} MAD / day</div>

<div class="details">${car.details}</div>

<a class="btn" target="_blank" href="https://wa.me/${WHATSAPP}?text=Salam bghit n7جز ${encodeURIComponent(car.name)}">
Reserve now (WhatsApp)
</a>

</div>

`;

container.appendChild(card);

});

}

renderCars();

</script>

</body>
</html>
